set timeout=10
set default=0

insmod all_video
insmod vbe
insmod vga
insmod gfxterm

# Safe default: pure text mode (no video mode search)
terminal_output console
set gfxpayload=text

menuentry "Kask OS v1.0.0  [Text Mode - Default]" {
    set gfxpayload=text
    terminal_output console
    multiboot2 /boot/kask_x86.elf
    boot
}

menuentry "Kask OS v1.0.0  [800 x 600]" {
    insmod gfxterm
    set gfxmode=800x600x32,800x600x24,800x600
    terminal_output gfxterm
    set gfxpayload=keep
    multiboot2 /boot/kask_x86.elf
    boot
}

menuentry "Kask OS v1.0.0  [1024 x 768]" {
    insmod gfxterm
    set gfxmode=1024x768x32,1024x768x24,1024x768
    terminal_output gfxterm
    set gfxpayload=keep
    multiboot2 /boot/kask_x86.elf
    boot
}

menuentry "Kask OS v1.0.0  [1280 x 720]" {
