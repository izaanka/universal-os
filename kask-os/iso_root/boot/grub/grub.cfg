set timeout=5
set default=0

# ---- Video mode fix ----
# Disable graphical terminal to avoid 'no suitable video mode found'
# on hardware without VESA/GOP support. Force pure VGA text console.
insmod all_video
insmod vbe
insmod vga
terminal_output console
set gfxpayload=text

menuentry "Kask OS v1.0.0 (64-bit)" {
    set gfxpayload=text
    multiboot2 /boot/kask_x86.elf
    boot
}

menuentry "Kask OS (Safe Mode - Text Only)" {
    set gfxpayload=text
    terminal_output console
    multiboot2 /boot/kask_x86.elf
    boot
}

menuentry "List Available Video Modes (Debug)" {
    videoinfo
}
